<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đơn của tôi — 30SHINE B2B Sale Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Hubot+Sans:wght@400;700;800;900&family=Manrope:wght@400;500;600;700;800&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<style>
body { visibility: hidden; }
body.auth-ok { visibility: visible; }
.auth-loading {
  position: fixed; inset: 0; z-index: 9999; visibility: visible;
  background: linear-gradient(135deg, #15397F 0%, #0A1F4D 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #fff; font-family: 'Manrope', sans-serif;
}
.auth-loading .spinner {
  width: 48px; height: 48px;
  border: 4px solid rgba(255,255,255,0.2);
  border-top-color: #D4A017;
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin-bottom: 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="auth-loading" id="authLoading">
  <div class="spinner"></div>
  <div>Đang xác thực...</div>
</div>
<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="brand-logo">
      <img src="assets/brand/mau_xanh.png" alt="30Shine" />
      <span class="brand-label">Sale Portal</span>
    </a>
    <div class="nav-links">
      <a href="index.html">Trang chủ</a>
      <a href="uu-dai.html">Ưu đãi & Bảng giá</a>
      <a href="sale.html">Tạo đơn</a>
      <a href="don-hang.html" class="active">Đơn của tôi</a>
      <a href="admin.html" id="nav_admin" style="display:none;">⚙️ Admin</a>
      <span id="user_box" style="margin-left:12px; color:rgba(255,255,255,0.9); font-size:13px; display:none;">
        <b id="user_name"></b> · <a href="#" id="btn_logout" style="color:var(--accent);">Đăng xuất</a>
      </span>
    </div>
  </div>
</nav>

<section style="background:linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); color:#fff; padding:40px 24px;">
  <div class="container">
    <h1 style="font-size:30px; font-weight:800;">📋 Đơn của tôi</h1>
    <p style="color:rgba(255,255,255,0.85); margin-top:6px;">Danh sách đơn đã tạo, nháp và chốt. Click để mở lại đơn sửa / xem báo giá.</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="filters">
      <button class="filter-chip active" data-status="all">Tất cả</button>
      <button class="filter-chip" data-status="Nháp">Nháp</button>
      <button class="filter-chip" data-status="Báo giá">Báo giá</button>
      <button class="filter-chip" data-status="Chốt đơn">Chốt đơn</button>
      <button class="filter-chip" data-status="Đã giao">Đã giao</button>
      <button class="filter-chip" data-status="Đã TT">Đã TT</button>
      <div style="margin-left:auto;">
        <a href="sale.html" class="btn btn-primary btn-sm">+ Tạo đơn mới</a>
      </div>
    </div>

    <div id="order_list" class="table-wrap">
      <div style="padding:40px; text-align:center; color:var(--text-muted);">Đang tải...</div>
    </div>

    <div id="summary" class="grid grid-3 mt-32" style="display:none;">
      <div class="card">
        <div class="text-muted" style="font-size:12px; text-transform:uppercase;">Tổng đơn chốt</div>
        <div style="font-size:28px; font-weight:800; color:var(--primary-dark);" id="s_orders">0</div>
      </div>
      <div class="card">
        <div class="text-muted" style="font-size:12px; text-transform:uppercase;">Doanh thu thực thu</div>
        <div style="font-size:28px; font-weight:800; color:var(--primary);" id="s_dt">0đ</div>
      </div>
      <div class="card">
        <div class="text-muted" style="font-size:12px; text-transform:uppercase;">LN thuần</div>
        <div style="font-size:28px; font-weight:800; color:var(--success);" id="s_ln">0đ</div>
      </div>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="footer-brand"><a href="index.html" class="brand-logo-footer">
      <img src="assets/brand/mau_trang.png" alt="30Shine" />
    </a></div>
  <div class="footer-copy">© 2026 30Shine</div>
</footer>

<script src="assets/data.js"></script>
<script src="assets/api.js"></script>
<script>
let ALL_ORDERS = [];
let currentFilter = 'all';

async function init() {
  const me = await apiMe();
  if (!me) {
    location.href = 'login.html?next=' + encodeURIComponent(location.pathname);
    return;
  }
  if (me.role !== 'admin' && me.role !== 'sale') {
    alert('Tài khoản "' + me.role + '" chỉ có quyền xem bảng giá.');
    location.href = 'bang-gia.html';
    return;
  }
  document.getElementById('authLoading').remove();
  document.body.classList.add('auth-ok');
  document.getElementById('user_box').style.display = '';
  document.getElementById('user_name').textContent = me.name + ' (' + me.role + ')';
  if (me.role === 'admin') document.getElementById('nav_admin').style.display = '';

  document.getElementById('btn_logout').addEventListener('click', e => {
    e.preventDefault(); location.href = apiLogoutUrl();
  });

  ALL_ORDERS = await apiListOrders();
  render();
}

function getField(f, key) {
  const v = f[key];
  if (v === undefined || v === null) return '';
  if (typeof v === 'string') return v;
  if (typeof v === 'number') return v;
  if (typeof v === 'boolean') return v;
  if (v.text) return v.text;
  if (Array.isArray(v) && v[0]?.text) return v[0].text;
  return v;
}

function render() {
  const list = ALL_ORDERS.filter(o => {
    if (currentFilter === 'all') return true;
    const st = getField(o.fields, 'Trạng thái');
    return st === currentFilter;
  });
  const listEl = document.getElementById('order_list');
  if (!list.length) {
    listEl.innerHTML = '<div style="padding:40px; text-align:center; color:var(--text-muted);">Chưa có đơn nào.<br><a href="sale.html" style="color:var(--primary);">Tạo đơn đầu tiên →</a></div>';
    document.getElementById('summary').style.display = 'none';
    return;
  }
  const sorted = [...list].sort((a, b) => {
    const ta = getField(a.fields, 'Ngày đặt') || 0;
    const tb = getField(b.fields, 'Ngày đặt') || 0;
    return tb - ta;
  });
  listEl.innerHTML = `<table>
    <thead><tr>
      <th>Mã đơn</th>
      <th>Ngày</th>
      <th>Khách hàng</th>
      <th class="center">Nhóm</th>
      <th class="center">CT</th>
      <th class="center">Bậc</th>
      <th class="num">DT thực</th>
      <th class="num">% LN</th>
      <th class="center">Trạng thái</th>
      <th></th>
    </tr></thead><tbody>${sorted.map(o => renderRow(o)).join('')}</tbody></table>`;

  // Summary (chỉ đếm đơn đã chốt trở đi)
  const closed = list.filter(o => ['Chốt đơn','Đã giao','Đã TT'].includes(getField(o.fields, 'Trạng thái')));
  const totDT = closed.reduce((s, o) => s + (getField(o.fields, 'DT thực thu') || 0), 0);
  const totLN = closed.reduce((s, o) => s + (getField(o.fields, 'LN thuần') || 0), 0);
  document.getElementById('s_orders').textContent = closed.length;
  document.getElementById('s_dt').textContent = fmtMoney(totDT);
  document.getElementById('s_ln').textContent = fmtMoney(totLN);
  document.getElementById('summary').style.display = '';
}

function renderRow(o) {
  const f = o.fields;
  const st = getField(f, 'Trạng thái');
  const badgeCls = st==='Chốt đơn'||st==='Đã TT'||st==='Đã giao' ? 'success'
                 : st==='Báo giá' ? 'warn'
                 : st==='Huỷ' ? 'danger' : 'primary';
  const ngay = getField(f, 'Ngày đặt');
  const dateStr = ngay ? new Date(ngay).toLocaleDateString('vi-VN') : '—';
  const maDon = getField(f, 'Mã đơn');
  return `<tr>
    <td><code style="background:var(--bg-soft); padding:2px 8px; border-radius:4px; font-size:12px;">${maDon}</code></td>
    <td style="font-size:13px;">${dateStr}</td>
    <td>${getField(f, 'KH') || '—'}</td>
    <td class="center"><span class="badge badge-primary">${getField(f, 'Nhóm KH') || '—'}</span></td>
    <td class="center"><b>${getField(f, 'Chương trình') || '—'}</b></td>
    <td class="center text-muted">${getField(f, 'Bậc') || '—'}</td>
    <td class="num font-mono">${fmtMoney(getField(f, 'DT thực thu') || 0)}</td>
    <td class="num font-mono">${fmtPct(getField(f, '% LN/NY') || 0)}</td>
    <td class="center"><span class="badge badge-${badgeCls}">${st}</span></td>
    <td><a href="sale.html?id=${o.record_id}" class="btn btn-outline btn-sm">Mở</a></td>
  </tr>`;
}

document.querySelectorAll('.filter-chip').forEach(c => {
  c.addEventListener('click', () => {
    document.querySelectorAll('.filter-chip').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    currentFilter = c.dataset.status;
    render();
  });
});

init();
</script>
</body>
</html>
